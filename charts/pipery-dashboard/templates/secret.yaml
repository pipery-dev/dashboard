{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pipery-dashboard.secretName" . }}
  labels:
    {{- include "pipery-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.nextauthSecretKey }}: {{ .Values.secrets.nextauthSecret | quote }}
  {{ .Values.secrets.githubClientIdKey }}: {{ .Values.secrets.githubClientId | quote }}
  {{ .Values.secrets.githubClientSecretKey }}: {{ .Values.secrets.githubClientSecret | quote }}
  {{ .Values.secrets.gitlabClientIdKey }}: {{ .Values.secrets.gitlabClientId | quote }}
  {{ .Values.secrets.gitlabClientSecretKey }}: {{ .Values.secrets.gitlabClientSecret | quote }}
  {{ .Values.secrets.bitbucketClientIdKey }}: {{ .Values.secrets.bitbucketClientId | quote }}
  {{ .Values.secrets.bitbucketClientSecretKey }}: {{ .Values.secrets.bitbucketClientSecret | quote }}
{{- end }}
