name: Release Pipery CLI

on:
  push:
    tags:
      - "pipery-cli-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "CLI version to release, for example 0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: node20-linux-x64
            binary_name: pipery
            asset_suffix: linux_amd64
          - os: ubuntu-latest
            target: node20-linux-arm64
            binary_name: pipery
            asset_suffix: linux_arm64
          - os: macos-13
            target: node20-macos-x64
            binary_name: pipery
            asset_suffix: darwin_amd64
          - os: macos-14
            target: node20-macos-arm64
            binary_name: pipery
            asset_suffix: darwin_arm64
          - os: windows-latest
            target: node20-win-x64
            binary_name: pipery.exe
            asset_suffix: windows_amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Derive version
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#pipery-cli-v}"
          fi
          echo "PIPERY_VERSION=$version" >> "$GITHUB_ENV"

      - name: Build standalone binary
        run: >
          npx --yes pkg@5.8.1
          packages/pipery-cli/bin/pipery.js
          --targets ${{ matrix.target }}
          --output dist/${{ matrix.binary_name }}

      - name: Package tarball
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          cp dist/${{ matrix.binary_name }} release/pipery
          chmod +x release/pipery
          tar -C release -czf dist/pipery-cli_${PIPERY_VERSION}_${{ matrix.asset_suffix }}.tar.gz pipery

      - name: Stage windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/${{ matrix.binary_name }} release/pipery.exe

      - name: Upload binary artifacts
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pipery-cli-${{ matrix.asset_suffix }}
          path: dist/pipery-cli_${{ env.PIPERY_VERSION }}_${{ matrix.asset_suffix }}.tar.gz

      - name: Upload windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: pipery-cli-${{ matrix.asset_suffix }}
          path: release/pipery.exe

  packages:
    name: Build Linux packages and release assets
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derive version
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#pipery-cli-v}"
          fi
          echo "PIPERY_VERSION=$version" >> "$GITHUB_ENV"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Collect release files
        shell: bash
        run: |
          mkdir -p dist
          find dist-artifacts -type f \( -name '*.tar.gz' -o -name '*.exe' \) -exec cp {} dist/ \;

      - name: Prepare linux package root
        shell: bash
        run: |
          mkdir -p release-root/usr/bin
          tar -xzf dist/pipery-cli_${PIPERY_VERSION}_linux_amd64.tar.gz -C release-root/usr/bin
          chmod +x release-root/usr/bin/pipery

      - name: Build deb and rpm packages
        shell: bash
        run: |
          docker run --rm \
            -e PIPERY_VERSION="${PIPERY_VERSION}" \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/goreleaser/nfpm:v2.41.3 \
            pkg \
            --packager deb \
            --config packaging/nfpm/pipery-cli.yaml \
            --target dist
          docker run --rm \
            -e PIPERY_VERSION="${PIPERY_VERSION}" \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/goreleaser/nfpm:v2.41.3 \
            pkg \
            --packager rpm \
            --config packaging/nfpm/pipery-cli.yaml \
            --target dist \
            --packager rpm

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          shasum -a 256 * > checksums.txt

      - name: Render Homebrew formula
        run: node scripts/render-pipery-cli-formula.mjs
        env:
          PIPERY_VERSION: ${{ env.PIPERY_VERSION }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
