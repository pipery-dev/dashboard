name: Pipery Dashboard CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pipery-dev/pipery-npm-ci@v1
        with:
          node_version: "22"
          package_manager: npm
          skip_sast: "true"
          skip_sca: "true"
          skip_versioning: "true"
          skip_packaging: "true"
          skip_release: "true"
          skip_reintegration: "true"

  image:
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}

  argocd-release:
    needs: image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish ArgoCD Helm chart update
        uses: pipery-dev/pipery-argocd-cd@v1
        with:
          publish_helm_chart_update: "true"
          argocd_repository: pipery-dev/pipery-argocd
          argocd_repository_token: ${{ secrets.PIPERY_ARGOCD_TOKEN }}
          app_name: pipery-dashboard
          app_namespace: pipery
          chart_path: charts/pipery-dashboard
          chart_target_revision: ${{ github.ref_name }}
          image_repository: ${{ env.IMAGE_REPOSITORY }}
          image_tag: ${{ env.IMAGE_TAG }}
          commit_user_name: pipery-dashboard
          commit_user_email: pipery-dashboard@users.noreply.github.com
