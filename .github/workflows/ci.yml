name: Pipery Dashboard CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
  RELEASE_IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
  RELEASE_SHA_TAG: sha-${{ github.sha }}

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pipery-dev/npm-ci@v1.1.3
        with:
          node_version: "22"
          package_manager: npm
          skip_sast: "true"
          skip_sca: "true"
          skip_versioning: "true"
          skip_packaging: "true"
          skip_release: "true"
          skip_reintegration: "true"

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pipery-dev/argocd-cd@v1
        with:
          validate_helm_chart: "true"
          app_name: pipery-dashboard
          chart_path: charts/pipery-dashboard
          skip_update: "true"
          skip_sync: "true"
          skip_status_check: "true"

  release-image:
    needs:
      - ci
      - helm
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pipery-dev/npm-ci@v1.1.3
        with:
          node_version: "22"
          package_manager: npm
          skip_sast: "true"
          skip_sca: "true"
          skip_lint: "true"
          skip_build: "true"
          skip_test: "true"
          skip_versioning: "true"
          skip_packaging: "true"
          skip_release: "true"
          release_docker_image: "true"
          docker_registry: ghcr.io
          docker_image: ${{ env.IMAGE_NAME }}
          docker_tags: ${{ env.RELEASE_IMAGE_TAG }},${{ env.RELEASE_SHA_TAG }}
          docker_platforms: linux/arm64
          docker_username: ${{ github.actor }}
          docker_password: ${{ secrets.GITHUB_TOKEN }}
          skip_reintegration: "true"

  argocd-release:
    needs: release-image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish ArgoCD Helm chart update
        uses: pipery-dev/pipery-argocd-cd@v1
        with:
          publish_helm_chart_update: "true"
          argocd_repository: pipery-dev/argocd
          argocd_repository_token: ${{ secrets.PIPERY_ARGOCD_TOKEN }}
          app_name: pipery-dashboard
          app_namespace: pipery
          chart_path: charts/pipery-dashboard
          chart_target_revision: ${{ github.ref_name }}
          image_repository: ${{ env.IMAGE_REPOSITORY }}
          image_tag: ${{ env.RELEASE_IMAGE_TAG }}
          helm_values: |
            imagePullSecrets:
              - name: ghcr-pull-secret
            ingress:
              className: nginx
            hostAliases:
              - ip: 172.25.0.2
                hostnames:
                  - auth.pipery.dev
          commit_user_name: pipery-dashboard
          commit_user_email: pipery-dashboard@users.noreply.github.com
